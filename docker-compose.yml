version: '3.8'
services:
  backend:
    build: ./app/backend
    ports: ["5000:5000"]
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: rootpass
      DB_NAME: fooddelivery
      JWT_SECRET: local-dev-secret
    depends_on: [mysql]

  frontend:
    build: ./app/frontend
    ports: ["3000:80"]

  mysql:
    image: mysql:8.0
    ports: ["3306:3306"]
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: fooddelivery
    volumes:
      - mysql_data:/var/lib/mysql
      - ./app/backend/config/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  mysql_data:
